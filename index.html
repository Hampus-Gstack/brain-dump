<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Brain Dump">
    <meta name="description" content="Zero-distraction brain dump capture">
    <title>Brain Dump</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app" id="app">
        <!-- Success overlay -->
        <div class="success-overlay" id="successOverlay">
            <div class="success-icon">
                <svg viewBox="0 0 52 52" class="checkmark">
                    <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <p class="success-text">Captured</p>
        </div>

        <!-- Error overlay -->
        <div class="error-overlay" id="errorOverlay">
            <p class="error-text" id="errorText">Connection error. Saved locally.</p>
        </div>

        <!-- Main capture area -->
        <div class="capture-container">
            <textarea 
                id="dumpInput" 
                class="dump-input" 
                placeholder="Dump it..."
                autofocus
                rows="1"
            ></textarea>
            <!-- Attachment preview -->
            <div class="attachment-preview" id="attachmentPreview" style="display:none">
                <img id="attachmentThumb" class="attachment-thumb" />
                <span id="attachmentName" class="attachment-name"></span>
                <button id="removeAttachment" class="remove-attachment" aria-label="Remove">✕</button>
            </div>
            <div class="actions">
                <input type="file" id="fileInput" accept="image/*,application/pdf,.doc,.docx,.txt" hidden />
                <button id="attachBtn" class="attach-btn" aria-label="Attach file">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
                <button id="voiceBtn" class="voice-btn" aria-label="Voice input">
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                    <div class="voice-pulse" id="voicePulse"></div>
                </button>
                <button id="dumpBtn" class="dump-btn" aria-label="Send">
                    <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <span class="chat-title">🤖 AI Assistant</span>
                <button id="chatClose" class="chat-close">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-bubble bot">Hej! Jag kan hjälpa dig med dina tasks, prioriteringar och frågor. Fråga mig vad som helst! 💬</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Fråga mig..." />
                <button id="chatSend" class="chat-send" aria-label="Send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="#" id="logLink" class="log-link">View Log ↗</a>
            <button id="chatToggle" class="chat-toggle" aria-label="Chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>
            <span class="queue-badge" id="queueBadge" style="display:none">
                <span class="queue-dot"></span>
                <span id="queueCount">0</span> queued
            </span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
